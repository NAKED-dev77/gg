<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARE YOU GAY?</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Pulse Animation for the reveal */
        @keyframes pulse {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.3); text-shadow: 0 0 20px #00ff80; }
            100% { transform: scale(1); filter: brightness(1); }
        }

        @keyframes rainbowBg {
            0% { background: #ff0000; }
            20% { background: #ffff00; }
            40% { background: #00ff00; }
            60% { background: #0088ff; }
            80% { background: #8800ff; }
            100% { background: #ff0000; }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
            text-align: center;
            transition: background 1s ease;
        }

        .rainbow-active {
            animation: rainbowBg 5s linear infinite !important;
        }

        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .hero-title { font-family: 'Outfit'; font-size: clamp(3rem, 15vw, 8rem); font-weight: 900; line-height: 1; }
        
        .rainbow-text {
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #0088ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% 100%;
            animation: flow 2s linear infinite;
        }

        @keyframes flow { to { background-position: 200% 50%; } }

        /* Quiz Styling */
        .quiz-container { max-width: 600px; width: 100%; }
        .option-card {
            padding: 20px; margin: 15px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .option-card:hover { transform: scale(1.05); background: rgba(255,255,255,0.1); border-color: #fff; }

        /* Results Reveal */
        #resultSection { display: none; }
        #resultSection.active { display: flex; }
        
        #congratsText {
            font-family: 'Outfit';
            font-size: clamp(2rem, 8vw, 4rem);
            animation: pulse 1s infinite;
            background: linear-gradient(90deg, #00ff80, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .final-pic {
            width: 300px;
            max-width: 80vw;
            border-radius: 25px;
            border: 5px solid #00ff80;
            box-shadow: 0 0 50px rgba(0,255,128,0.6);
            opacity: 0;
            transform: translateY(20px);
            transition: all 1.5s ease-out;
        }

        .show-pic { opacity: 1; transform: translateY(0); }

        .loading-ring {
            width: 60px; height: 60px;
            border: 5px solid #333;
            border-top: 5px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <section id="hero">
        <h1 class="hero-title">ARE YOU <br><span class="rainbow-text">GAY?</span></h1>
        <p style="margin-top: 30px; opacity: 0.4; letter-spacing: 2px;">SCROLL TO DISCOVER THE TRUTH</p>
    </section>

    <section id="quizSection">
        <div class="quiz-container">
            <p id="qCount" style="color: #666; margin-bottom: 10px;">QUESTION 1 OF 15</p>
            <h2 id="qText" style="font-size: 2rem; margin-bottom: 30px;">Loading...</h2>
            <div id="optionsWrapper"></div>
        </div>
    </section>

    <section id="loadingSection" style="display:none;">
        <div class="loading-ring"></div>
        <h2 class="rainbow-text">CALCULATING RAINBOW ENERGY...</h2>
    </section>

    <section id="resultSection">
        <div id="specialReveal">
            <h1 id="congratsText">CONGRATS! <br> YOU WON A NIGHT WITH ME</h1>
            
            <img src="owner_pic.jpgc" id="finalBoss" class="final-pic">
            
            <p style="margin-top: 20px; font-weight: bold; color: #00ff80; letter-spacing: 3px;">THE GRAND PRIZE 🫡</p>
        </div>
        <button onclick="location.reload()" style="margin-top: 40px; background: none; border: 1px solid #333; color: #666; padding: 10px 20px; cursor: pointer;">RESTART TEST</button>
    </section>

    <script>
        const questions = [
            { q: "How do you sit on a chair?", a: ["Feet flat on floor", "Legs crossed over each other", "One leg tucked under", "Like a pretzel"] },
            { q: "Pick your morning fuel:", a: ["Black Coffee", "Oat Milk Iced Latte", "Energy Drink", "Water"] },
            { q: "What's your reaction to drama?", a: ["Avoid it", "I am the source", "Popcorn and watch", "Spill the tea"] },
            { q: "How many Spotify playlists?", a: ["Just one", "50+ organized by vibe", "I use their Daily Mix", "I listen to radio"] },
            { q: "Pick a vacation spot:", a: ["Mountains", "European City Tour", "Beach", "Staycation"] }
        ];

        let currentIdx = 0;
        let userScores = [];

        function renderQuestion() {
            // Cycle through questions or repeat if 15 haven't passed
            const qData = questions[currentIdx % questions.length];
            document.getElementById('qCount').innerText = `QUESTION ${currentIdx + 1} OF 15`;
            document.getElementById('qText').innerText = qData.q;
            
            const wrapper = document.getElementById('optionsWrapper');
            wrapper.innerHTML = '';
            
            qData.a.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'option-card';
                div.innerText = opt;
                div.onclick = () => handleSelect();
                wrapper.appendChild(div);
            });
        }

        function handleSelect() {
            userScores.push(0); // FORCE 0% SCORE
            currentIdx++;
            
            if (currentIdx < 15) {
                renderQuestion();
            } else {
                startAnalysis();
            }
        }

        function startAnalysis() {
            document.getElementById('quizSection').style.display = 'none';
            document.getElementById('loadingSection').style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('loadingSection').style.display = 'none';
                showFinalResult();
            }, 3000);
        }

        function showFinalResult() {
            const res = document.getElementById('resultSection');
            res.classList.add('active');
            res.scrollIntoView({ behavior: 'smooth' });

            setTimeout(() => {
                document.getElementById('finalBoss').classList.add('show-pic');
                document.body.classList.add('rainbow-active');
            }, 2500);
        }

        // Initialize
        renderQuestion();
    </script>
</body>
</html>
