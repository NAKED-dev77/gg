<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARE YOU GAY?</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Pulse Animation for the reveal */
        @keyframes pulse {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.3); text-shadow: 0 0 20px #00ff80; }
            100% { transform: scale(1); filter: brightness(1); }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-15px);}
            60% {transform: translateY(-7px);}
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            text-align: center;
            overflow-x: hidden;
        }

        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .hero-title { font-family: 'Outfit'; font-size: clamp(3rem, 15vw, 8rem); font-weight: 900; }
        
        .rainbow-text {
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #0088ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% 100%;
            animation: flow 2s linear infinite;
        }
        @keyframes flow { to { background-position: 200% 50%; } }

        /* Quiz Styling */
        .quiz-container { max-width: 600px; width: 100%; }
        .option-card {
            padding: 20px; margin: 15px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        .option-card:hover { transform: scale(1.05); background: rgba(255,255,255,0.1); border-color: #fff; }

        /* Result Section - Forces Scrolling */
        #resultSection {
            display: none;
            min-height: 200vh; 
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 150px;
        }

        #resultSection.active { display: flex; }

        #congratsText {
            font-family: 'Outfit';
            font-size: clamp(2rem, 8vw, 4.5rem);
            animation: pulse 1s infinite;
            background: linear-gradient(90deg, #00ff80, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 70vh; /* Pushes the prize way down */
        }

        .scroll-hint {
            font-size: 1.2rem;
            color: #00ff80;
            font-weight: bold;
            letter-spacing: 5px;
            animation: bounce 2s infinite;
        }

        .final-pic {
            width: 350px;
            max-width: 85vw;
            border-radius: 25px;
            border: 6px solid #00ff80;
            box-shadow: 0 0 70px rgba(0,255,128,0.5);
            margin-bottom: 30px;
        }

        button.restart {
            margin-top: 50px;
            background: white;
            color: black;
            border: none;
            padding: 15px 40px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <section id="hero">
        <h1 class="hero-title">ARE YOU <br><span class="rainbow-text">GAY?</span></h1>
        <p style="margin-top: 30px; opacity: 0.4; letter-spacing: 3px;">SCROLL DOWN TO DISCOVER THE TRUTH</p>
    </section>

    <section id="quizSection">
        <div class="quiz-container">
            <p id="qCount" style="color: #666; margin-bottom: 10px;">QUESTION 1 OF 15</p>
            <h2 id="qText" style="font-size: 2rem; margin-bottom: 30px;">Loading...</h2>
            <div id="optionsWrapper"></div>
        </div>
    </section>

    <section id="resultSection">
        <h1 id="congratsText">CONGRATS! <br> YOU WON A NIGHT WITH ME</h1>
        <p class="scroll-hint">↓ KEEP SCROLLING TO CLAIM ↓</p>
        
        <div style="margin-top: 20vh;">
            <img src="owner_pic.jpg" id="finalBoss" class="final-pic" onerror="this.src='https://via.placeholder.com/350?text=File+Not+Found+Check+GitHub'">
            <h2 style="color: #00ff80; letter-spacing: 5px; font-family: 'Outfit'; font-size: 2rem;">THE GRAND PRIZE 🫡</h2>
            <p style="margin-top: 10px; opacity: 0.6;">System Overwritten. 0% Gayness detected.</p>
            <button class="restart" onclick="location.reload()">Take Again</button>
        </div>
    </section>

    <script>
        const questions = [
            "How do you sit on a chair?",
            "Pick your morning fuel:",
            "How many Spotify playlists?",
            "Opinion on IKEA?",
            "Favorite weather?",
            "Reaction to drama?",
            "How many tabs are open right now?",
            "Pick a vacation spot:",
            "How often do you cry at movies?",
            "Texting style?"
        ];

        let count = 0;

        function loadQuestion() {
            document.getElementById('qCount').innerText = `QUESTION ${count + 1} OF 15`;
            document.getElementById('qText').innerText = questions[count % questions.length];
            const wrapper = document.getElementById('optionsWrapper');
            wrapper.innerHTML = '';
            ["Option A", "Option B", "Option C", "Option D"].forEach(opt => {
                const div = document.createElement('div');
                div.className = 'option-card';
                div.innerText = opt;
                div.onclick = handleAnswer;
                wrapper.appendChild(div);
            });
        }

        function handleAnswer() {
            count++;
            if (count < 15) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('hero').style.display = 'none';
            document.getElementById('quizSection').style.display = 'none';
            const res = document.getElementById('resultSection');
            res.classList.add('active');
            window.scrollTo(0, 0);
        }

        loadQuestion();
    </script>
</body>
</html>
