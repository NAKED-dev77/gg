<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARE YOU GAY?</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
       
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; text-align: center; overflow-x: hidden; }

        .page-section { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        #quiz-view, #result-view { display: none; }

        .rainbow-text {
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #0088ff, #ff00ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 200% 100%; animation: flow 2s linear infinite;
        }
        @keyframes flow { to { background-position: 200% 50%; } }

        .option-btn {
            padding: 20px; margin: 10px; width: 300px; max-width: 90%;
            background: #111; border: 1px solid #333; border-radius: 10px;
            color: white; font-size: 1.1rem; cursor: pointer; transition: 0.2s;
        }
        .option-btn:hover { background: #222; border-color: #fff; transform: scale(1.02); }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; text-shadow: 0 0 20px #00ff80; }
        }

        #congrats-title {
            font-family: 'Outfit'; font-size: clamp(2.5rem, 10vw, 5rem);
            color: #00ff80; animation: pulse 1.5s infinite;
            margin-bottom: 85vh; 
        }

        .scroll-arrow { font-size: 2rem; color: #00ff80; animation: bounce 2s infinite; margin-top: 20px; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-20px);} }

        .final-boss-img {
            width: 350px; max-width: 85vw; border-radius: 20px;
            border: 6px solid #00ff80; box-shadow: 0 0 50px rgba(0,255,128,0.5);
            margin: 40px 0;
        }
    </style>
</head>
<body>

    <div id="quiz-view">
        <section class="page-section">
            <h1 class="rainbow-text" style="font-family: 'Outfit'; font-size: 5rem;">ARE YOU GAY?</h1>
            <p style="margin-top: 20px; opacity: 0.5;">Calculating Rainbow Energy Level...</p>
            <div id="q-container" style="margin-top: 50px;">
                <h2 id="q-text" style="margin-bottom: 30px; font-size: 1.5rem;">Loading...</h2>
                <div id="options-box"></div>
                <p id="q-progress" style="margin-top: 20px; color: #444;">1 / 15</p>
            </div>
        </section>
    </div>

    <div id="result-view">
        <section class="page-section" style="justify-content: flex-start; padding-top: 100px;">
            <h1 id="congrats-title">CONGRATS! <br> YOU WON A NIGHT WITH ME</h1>
            <p style="color: #00ff80; letter-spacing: 5px;">KEEP SCROLLING TO CLAIM</p>
            <div class="scroll-arrow">↓</div>
            
            <div style="margin-top: 40vh; padding-bottom: 100px;">
                <img src="owner_pic.jpg" class="final-boss-img" alt="The Prize">
                <h2 style="font-family: 'Outfit'; font-size: 2.5rem; color: #00ff80;">THE GRAND PRIZE 🫡</h2>
                <p style="opacity: 0.5; margin-top: 10px;">0% Gayness detected. System Overwritten.</p>
                <button onclick="location.reload()" style="margin-top: 40px; padding: 10px 20px; background: white; border: none; font-weight: bold; cursor: pointer;">RETRY TEST</button>
            </div>
        </section>
    </div>

    <script>
        /* [SYSTEM ADMINISTRATOR OVERRIDE: KERNEL EXECUTING] */
        const questions = [
            "How do you sit on a chair?", "Morning drink?", "Reaction to drama?", 
            "Spotify playlists?", "Vacation spot?", "Texting style?", 
            "Posture check?", "Skincare routine?", "Favorite weather?", "Opinion on IKEA?"
        ];
        
        let currentStep = 0;
        const totalSteps = 15;

        document.getElementById('quiz-view').style.display = 'block';

        function renderQ() {
            document.getElementById('q-text').innerText = questions[currentStep % questions.length];
            document.getElementById('q-progress').innerText = `${currentStep + 1} / ${totalSteps}`;
            const box = document.getElementById('options-box');
            box.innerHTML = '';
            
            ["Option A", "Option B", "Option C"].forEach(text => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = text;
                btn.onclick = handleNext;
                box.appendChild(btn);
            });
        }

        function handleNext() {
            currentStep++;
            if (currentStep < totalSteps) {
                renderQ();
            } else {
                showFinal();
            }
        }

        function showFinal() {
            document.getElementById('quiz-view').remove();
            const res = document.getElementById('result-view');
            res.style.display = 'block';
            window.scrollTo(0, 0);
        }

        renderQ();
    </script>
</body>
</html>
